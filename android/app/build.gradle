apply plugin: 'com.android.application'

// Keep :app outputs outside android/app/build/ so packageRelease can delete/recreate the output
// folder even when OneDrive/Explorer/antivirus holds a lock on a previous app-release.apk.
// Override with env CARENET_ANDROID_BUILD_DIR (absolute path).
def resolveCarenetAppBuildDirectory() {
    def fromEnv = System.getenv("CARENET_ANDROID_BUILD_DIR")
    if (fromEnv != null && !fromEnv.trim().isEmpty()) {
        return file(fromEnv.trim())
    }
    def os = System.getProperty("os.name", "").toLowerCase()
    if (os.contains("windows")) {
        def la = System.getenv("LOCALAPPDATA")
        if (la != null && !la.isEmpty()) {
            return file(la + "/CareNet2-Android-app-build")
        }
    }
    return file("${rootProject.projectDir}/../.carenet-android-build")
}
layout.buildDirectory.set(resolveCarenetAppBuildDirectory())

// Play Store release signing — see android/keystore.properties.example
def keystorePropertiesFile = rootProject.file("keystore.properties")
def keystoreProperties = new Properties()
if (keystorePropertiesFile.exists()) {
    keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
}
def carenetAllowDebugSigning =
    project.hasProperty("carenetAllowDebugSigning") &&
    project.property("carenetAllowDebugSigning").toString() == "true"

android {
    namespace = "com.carenet.app"
    compileSdk = rootProject.ext.compileSdkVersion
    defaultConfig {
        applicationId "com.carenet.app"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        // Increment versionCode for every upload to Play Console.
        versionCode 2
        versionName "1.0.0"
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        aaptOptions {
             // Files and dirs to omit from the packaged assets dir, modified to accommodate modern web apps.
             // Default: https://android.googlesource.com/platform/frameworks/base/+/282e181b58cf72b6ca770dc7ca5f91f135444502/tools/aapt/AaptAssets.cpp#61
            ignoreAssetsPattern = '!.svn:!.git:!.ds_store:!*.scc:.*:!CVS:!thumbs.db:!picasa.ini:!*~'
        }
    }

    signingConfigs {
        release {
            if (keystorePropertiesFile.exists()) {
                keyAlias keystoreProperties["keyAlias"]
                keyPassword keystoreProperties["keyPassword"]
                def storeFileProp = keystoreProperties["storeFile"]
                if (storeFileProp != null && !storeFileProp.toString().trim().isEmpty()) {
                    storeFile rootProject.file(storeFileProp)
                }
                storePassword keystoreProperties["storePassword"]
            }
        }
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
            if (keystorePropertiesFile.exists()) {
                signingConfig signingConfigs.release
            } else if (carenetAllowDebugSigning) {
                signingConfig signingConfigs.debug
                println("WARNING: Release build uses DEBUG signing (not valid for Play Store).")
            } else {
                throw new GradleException(
                    "Missing android/keystore.properties — required for a Play Store release build.\n" +
                    "1. Copy android/keystore.properties.example to android/keystore.properties\n" +
                    "2. Create an upload keystore (keytool) and set storeFile / passwords / alias\n" +
                    "For a local unsigned-style test only: gradlew bundleRelease -PcarenetAllowDebugSigning=true"
                )
            }
        }
    }
}

repositories {
    flatDir{
        dirs '../capacitor-cordova-android-plugins/src/main/libs', 'libs'
    }
}

dependencies {
    implementation fileTree(include: ['*.jar'], dir: 'libs')
    implementation "androidx.activity:activity:$androidxActivityVersion"
    implementation "androidx.appcompat:appcompat:$androidxAppCompatVersion"
    implementation "androidx.coordinatorlayout:coordinatorlayout:$androidxCoordinatorLayoutVersion"
    implementation "androidx.core:core-splashscreen:$coreSplashScreenVersion"
    implementation project(':capacitor-android')
    testImplementation "junit:junit:$junitVersion"
    androidTestImplementation "androidx.test.ext:junit:$androidxJunitVersion"
    androidTestImplementation "androidx.test.espresso:espresso-core:$androidxEspressoCoreVersion"
    implementation project(':capacitor-cordova-android-plugins')
}

apply from: 'capacitor.build.gradle'

try {
    def servicesJSON = file('google-services.json')
    if (servicesJSON.text) {
        apply plugin: 'com.google.gms.google-services'
    }
} catch(Exception e) {
    logger.info("google-services.json not found, google-services plugin not applied. Push Notifications won't work")
}
